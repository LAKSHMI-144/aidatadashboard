# Production Configuration for AI Data Dashboard Backend

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Spring Profile
spring.profiles.active=prod

# Logging Configuration
logging.level.root=WARN
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN

# CORS Configuration for Production
# This will be configured programmatically to allow your Vercel frontend
# You can also add specific domains here if needed

# OpenAI Configuration (use environment variable)
# OPENAI_API_KEY will be set in Railway environment variables

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Performance Settings
spring.jmx.enabled=false
spring.config.activate.on-profile=prod
